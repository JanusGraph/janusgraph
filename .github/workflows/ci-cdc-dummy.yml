# Companion to ci-cdc.yml: when a change touches only the paths that ci-cdc.yml ignores (docs, etc.),
# the real workflow does not run. This dummy reports the same status check names as success so required
# checks are satisfied. Keep the matrix names in sync with ci-cdc.yml.

name: CI CDC

on:
  pull_request:
    paths:
    - 'docs/**'
    - '.github/workflows/ci-docs.yml'
    - '.github/ISSUE_TEMPLATE/**'
    - 'requirements.txt'
    - 'mkdocs.yml'
    - 'docs.Dockerfile'
    - '*.md'

jobs:
  tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - name: cdc-java8
            java: 8
          - name: cdc-java11
            install-args: "-Pjava-11"
            java: 11
          - name: cdc-e2e-java17
            java: 17
    steps:
      - run: 'echo "No build required"'
